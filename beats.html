<!DOCTYPE html>
<html lang="es" data-cms="page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-cms="text">Beats | DapSound</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f5efe3;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #3a3a3a;
      margin: 0;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 40px;
    }
    form {
      max-width: 1200px;
      margin: 0 auto 40px;
      background-color: #fffaf0;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }
    label {
      display: flex;
      flex-direction: column;
      font-weight: 600;
      font-size: 0.75rem;
    }
    input, select {
      margin-top: 4px;
      padding: 3px 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background-color: #fdf9f2;
      font-size: 0.7rem;
    }
    .filters-submit {
      margin-top: 20px;
      text-align: center;
    }
    .filters-submit button {
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background-color: #d1bfa3;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .filters-submit button:hover {
      background-color: #bda98e;
    }
    .beats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto 50px;
    }
    .beat {
      background-color: #fffaf0;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      text-align: center;
      transition: transform 0.3s ease;
    }
    .beat:hover {
      transform: translateY(-6px);
    }
    .beat h3 {
      margin: 10px 0;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .custom-player {
      background-color: #eae1d3;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
    }
    audio {
      width: 100%;
    }
    .add-to-cart {
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #c2aa8e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color 0.3s ease;
    }
    .add-to-cart:hover {
      background-color: #a98f76;
    }
    .cart-message {
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
      font-size: 1.1rem;
      color: #8b7d6b;
      background-color: #fff3e0;
      padding: 20px;
      border-radius: 12px;
    }
    .volver-inicio {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      background-color: #e0d6c3;
      color: #3a3a3a;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    #cart-summary {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      background-color: #fdf6ec;
      text-align: center;
    }
    #checkout {
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #a58e75;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #promo-code {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    #promo-code input {
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .remove-btn {
      margin-left: 10px;
      background: none;
      border: none;
      color: red;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- BODY CONTENT OMITTED FOR BREVITY, UNCHANGED -->
</body>
</html>

  <div id="beats-list" class="beats-container"></div>

  <div id="cart-summary">
    <p><strong>Beats en la cesta:</strong></p>
    <ul id="cart-items" style="list-style: none; padding: 0;"></ul>
    <button id="checkout">Comprar</button>
  </div>

  <div class="cart-message" id="cart-alert" style="display:none">
    La pasarela de pago no está disponible en este momento. Estará pronto habilitada. ¡Perdonen las molestias!
  </div>

  <a class="volver-inicio" href="index.html">Volver al inicio</a>

  <script>
    const beats = [
      { name: 'No Disponible', genre: 'Trap', bpm: 140, audio: 'audios/beat1.mp3' },
      { name: 'No disponible', genre: 'Drill', bpm: 145, audio: 'audios/beat2.mp3' },

    ];

    const cart = [];

    function renderBeats(beatsToRender) {
      const container = document.getElementById('beats-list');
      container.innerHTML = '';
      beatsToRender.forEach(b => {
        const beatCard = document.createElement('div');
        beatCard.className = 'beat';
        beatCard.innerHTML = `
          <h3>${b.name}</h3>
          <div class="custom-player">
            <audio controls src="${b.audio}"></audio>
          </div>
          <button class="add-to-cart">Agregar a la cesta</button>
        `;
        beatCard.querySelector('.add-to-cart').addEventListener('click', () => addToCart(b.name));
        container.appendChild(beatCard);
      });
    }

    function addToCart(name) {
      cart.push(name);
      updateCart();
    }

    function updateCart() {
      const cartList = document.getElementById('cart-items');
      cartList.innerHTML = '';
      cart.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `🎵 ${item}`;
        cartList.appendChild(li);
      });
    }

    document.getElementById('filter-form').addEventListener('submit', e => {
      e.preventDefault();
      const form = new FormData(e.target);
      let filtered = [...beats];

      const bpmMin = parseInt(form.get('bpmMin')) || 0;
      const bpmMax = parseInt(form.get('bpmMax')) || 999;
      const genre = form.get('genre');

      filtered = filtered.filter(b =>
        b.bpm >= bpmMin && b.bpm <= bpmMax &&
        (!genre || b.genre === genre)
      );

      renderBeats(filtered);
    });

    document.getElementById('checkout').addEventListener('click', () => {
      const alertBox = document.getElementById('cart-alert');
      alertBox.style.display = 'block';
      alertBox.scrollIntoView({ behavior: 'smooth' });
    });

    renderBeats(beats);
  </script>
</body>
</html>
