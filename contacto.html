<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | DapSound</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #f5efe3;
      color: #3a3a3a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      font-family: 'Playfair Display', serif;
      margin-bottom: 10px;
    }

    form {
      max-width: 500px;
      width: 100%;
      background-color: #fffaf0;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-bottom: 15px;
      font-weight: bold;
      text-align: left;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background-color: #d5cbb9;
      color: #3a3a3a;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #cbbca6;
    }

    .volver {
      margin-top: 30px;
      display: inline-block;
      text-decoration: none;
      background-color: #e0d6c3;
      color: #3a3a3a;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
    }

    p.intro {
      max-width: 500px;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <h1>Contacto</h1>

  <p class="intro">
    Si quieres contactar con nosotros o escribir directamente, puedes hacerlo a través del siguiente formulario o al correo: 
    dani@dapsound.com</a>.
  </p>

  <form action="https://formspree.io/f/mvgqqewa" method="POST">
    <label>
      Tu correo electrónico:
      <input type="email" name="email" required />
    </label>
    <label>
      Tu mensaje:
      <textarea name="message" required></textarea>
    </label>
    <button type="submit">Enviar mensaje</button>
  </form>

  <a class="volver" href="index.html">Volver al inicio</a>

</body>
</html>
