<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj de Ciudad Actual</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: transparent;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .reloj {
            background: transparent;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
            width: 160px;
            margin: auto;
            font-size: 0.9em;
        }

        .reloj h2 {
            margin: 5px 0;
            font-size: 1em;
        }

        .hora {
            font-size: 1.4em;
            font-weight: bold;
        }

        .fecha {
            margin-top: 5px;
            font-size: 0.9em;
            color: #ccc;
        }

        .ciudad {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<div class="reloj">
    <h2 id="zona"></h2>
    <div class="hora" id="horaLocal"></div>
    <div class="fecha" id="fechaLocal"></div>
    <div class="ciudad" id="ciudad"></div>
</div>

<script>
    function actualizarRelojLocal() {
        const ahora = new Date();
        const opcionesHora = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };

        const hora = ahora.toLocaleTimeString(undefined, opcionesHora);
        const fecha = ahora.toLocaleDateString(undefined, opcionesFecha);

        document.getElementById('horaLocal').innerText = hora;
        document.getElementById('fechaLocal').innerText = fecha;

        try {
            const zona = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('zona').innerText = `Hora local`;
        } catch (e) {
            document.getElementById('zona').innerText = `Hora local`;
        }
    }

    function obtenerCiudad() {
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                if (data && data.city) {
                    document.getElementById('ciudad').innerText = data.city;
                }
            })
            .catch(() => {
                document.getElementById('ciudad').innerText = 'Ciudad desconocida';
            });
    }

    setInterval(actualizarRelojLocal, 1000);
    actualizarRelojLocal();
    obtenerCiudad();
</script>

</body>
</html>
