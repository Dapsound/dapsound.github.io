<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DapSound | En Mantenimiento</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5efe3;
      color: #3a3a3a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    nav {
      width: 100%;
      background-color: #d5cbb9;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 100;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
    }

    nav a {
      text-decoration: none;
      color: #3a3a3a;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #000;
    }

    .branding {
      margin: 60px 0 40px;
    }

    .branding span {
      background-color: #d5cbb9;
      color: #3a3a3a;
      padding: 15px 40px;
      border-radius: 12px;
      font-size: 2.5rem;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      max-width: 600px;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #888;
    }

    .cat {
      width: 150px;
      height: 150px;
      background: url('https://media.giphy.com/media/q1MeAPDDMb43K/giphy.gif') no-repeat center/contain;
      animation: floatCat 3s ease-in-out infinite;
      margin-top: 30px;
    }

    .redes {
      margin-top: 20px;
    }

    .redes a {
      text-decoration: none;
      color: #3a3a3a;
      background-color: #e0d6c3;
      padding: 10px 20px;
      border-radius: 8px;
      margin: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.3s;
    }

    .redes a:hover {
      background-color: #d5cbb9;
    }

    .redes img {
      width: 20px;
      height: 20px;
    }

    @keyframes floatCat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }

      .cat {
        width: 100px;
        height: 100px;
      }

      nav {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="Sobre Nosotros.html">Sobre Nosotros</a>
    <a href="beats.html">Beats Shop</a>
   <a href="contacto.html">Contacto</a>
  </nav>

  <div class="branding">
    <span>DapSound</span>
  </div>

  <h1>Estamos en mantenimiento</h1>
  <p>Estamos trabajando para ofrecerte una mejor experiencia.<br>Volveremos pronto. ¡Gracias por tu paciencia!</p>

  <div class="cat"></div>

  <div class="redes">
    <a href="https://instagram.com/dap.sound" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
      Síguenos en Instagram
    </a>
  </div>

  <footer>&copy; 2025 DapSound. Todos los derechos reservados.</footer>
</body>
</html>
